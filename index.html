<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skandale.dk <span id="app-version"></span> • 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50">
    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center gap-x-3">
                    <div class="flex items-center gap-x-3">
                        <div class="w-11 h-11 bg-[#C8102E] rounded-2xl flex items-center justify-center shadow-lg">
                            <i class="fa-solid fa-balance-scale text-white text-3xl"></i>
                        </div>
                        <div>
                            <span class="font-bold text-3xl tracking-tighter text-slate-900">Skandale</span>
                            <span class="font-bold text-3xl tracking-tighter text-[#C8102E]">.dk</span>
                        </div>
                    </div>
                    
                    <div class="hidden sm:flex items-center bg-emerald-100 text-emerald-700 text-sm font-bold px-3.5 py-1.5 rounded-2xl border border-emerald-200">
                        <i class="fa-solid fa-check-double mr-1.5"></i>
                        <span id="navbar-version" class="font-extrabold tracking-wider"></span>
                    </div>
                </div>
                
                <div class="flex items-center gap-x-2">
                    <button onclick="showTimeline()" class="flex items-center gap-x-2 px-4 py-2 rounded-2xl text-sm font-semibold border border-slate-300 hover:bg-slate-100 transition-colors">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                        <span class="hidden md:inline ml-1.5">Tidslinje</span>
                    </button>
                    
                    <button onclick="showPartyOverview()" class="flex items-center gap-x-2 px-4 py-2 rounded-2xl text-sm font-semibold border border-slate-300 hover:bg-slate-100 transition-colors">
                        <i class="fa-solid fa-users"></i>
                        <span class="hidden md:inline ml-1.5">Partier</span>
                    </button>
                    
                    <button onclick="showCompareModal()" class="flex items-center gap-x-2 px-4 py-2 rounded-2xl text-sm font-semibold border border-slate-300 hover:bg-slate-100 transition-colors">
                        <i class="fa-solid fa-balance-scale"></i>
                        <span class="hidden md:inline ml-1.5">Sammenlign</span>
                    </button>
                    
                    <button onclick="showStatsModal()" class="flex items-center gap-x-2 px-4 py-2 rounded-2xl text-sm font-semibold border border-slate-300 hover:bg-slate-100 transition-colors">
                        <i class="fa-solid fa-chart-bar"></i>
                        <span class="hidden md:inline ml-1.5">Statistik</span>
                    </button>
                    
                    <button onclick="showAddScandalModal()" class="flex items-center gap-x-2 bg-[#C8102E] hover:bg-[#A00E26] transition-colors text-white px-4 py-2 rounded-2xl text-sm font-semibold shadow-sm">
                        <i class="fa-solid fa-plus"></i>
                        <span class="hidden sm:inline ml-1.5">Tilføj</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white">
        <div class="max-w-5xl mx-auto px-6 pt-16 pb-20 text-center">
            <div class="inline-flex items-center gap-x-2 bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-full mb-6 text-sm">
                <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                <span class="font-medium"><span id="app-version-hero"></span> • 12 politikere</span>
            </div>
            
            <h1 class="text-5xl md:text-7xl font-bold tracking-tighter heading-font mb-6">
                Alle skandaler.<br>Én oversigt.
            </h1>
            <p class="max-w-2xl mx-auto text-xl text-slate-300 mb-10">
                Søg på en politiker – se skandaler, støtte og hvad der burde være sket.
            </p>
            
            <div class="max-w-xl mx-auto relative">
                <input id="searchInput" type="text" placeholder="Søg efter politiker..." class="search-input w-full bg-white text-slate-900 border border-white/20 focus:border-[#C8102E] px-6 py-4 pl-14 rounded-3xl text-lg shadow-xl outline-none" onkeyup="filterPoliticians()">
                <i class="fa-solid fa-search absolute left-6 top-4.5 text-xl text-slate-400"></i>
            </div>
        </div>
    </div>

    <!-- Politicians Grid -->
    <div class="max-w-7xl mx-auto px-6 py-16">
        <h2 class="text-4xl font-bold tracking-tight text-slate-900 mb-8">Kendte politikere</h2>
        <div id="politiciansGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-12">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-sm">Skandale.dk <span id="app-version-footer"></span> • v2.00.05</p>
        </div>
    </footer>

    <!-- Politician Modal -->
    <div id="politicianModal" onclick="if (event.target.id === 'politicianModal') closeModal()" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="bg-white rounded-3xl max-w-3xl w-full max-h-[94vh] overflow-hidden shadow-2xl modal">
            
            <div id="modalHeader" class="px-8 pt-8 pb-6 flex items-start justify-between border-b">
                <div class="flex items-center gap-x-5">
                    <div id="modalAvatar" class="w-20 h-20 rounded-3xl flex-shrink-0 flex items-center justify-center text-white text-4xl font-bold shadow-inner"></div>
                    <div>
                        <div id="modalName" class="text-4xl font-bold tracking-tight"></div>
                        <div class="flex items-center gap-x-3 mt-1">
                            <div id="modalParty" class="inline-block px-3.5 py-1 text-xs font-bold tracking-wider rounded-full"></div>
                            <div id="modalRole" class="text-sm text-slate-500"></div>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-x-2">
                    <button id="share-btn" class="flex items-center gap-x-2 px-4 py-2 text-sm font-semibold text-slate-700 hover:text-slate-900 border border-slate-300 hover:bg-slate-100 rounded-2xl transition-all">
                        <i class="fa-solid fa-share-alt"></i>
                        <span>Del</span>
                    </button>
                    
                    <button onclick="exportPoliticianToPDF(currentPolitician)" class="flex items-center gap-x-2 px-4 py-2 text-sm font-semibold text-slate-700 hover:text-slate-900 border border-slate-300 hover:bg-slate-100 rounded-2xl transition-all">
                        <i class="fa-solid fa-file-pdf"></i>
                        <span class="hidden sm:inline">PDF</span>
                    </button>
                    
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-3 -mr-3 -mt-3">
                        <i class="fa-solid fa-times text-3xl"></i>
                    </button>
                </div>
            </div>
            
            <div class="p-8 overflow-y-auto max-h-[calc(94vh-170px)]">
                <div class="mb-8">
                    <div class="uppercase tracking-[2px] text-xs font-semibold text-slate-500 mb-2">OM POLITIKEREN</div>
                    <div id="modalBio" class="text-slate-600 leading-relaxed"></div>
                </div>
                
                <div>
                    <div class="flex items-center justify-between mb-5">
                        <div>
                            <span class="uppercase tracking-[2px] text-xs font-semibold text-slate-500">SKANDALER</span>
                            <span id="modalScandalCount" class="ml-3 text-2xl font-bold text-slate-900"></span>
                        </div>
                    </div>
                    <div id="modalScandals" class="space-y-4">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Timeline Modal -->
    <div id="timelineModal" onclick="if (event.target.id === 'timelineModal') closeTimeline()" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="bg-white rounded-3xl max-w-5xl w-full max-h-[90vh] overflow-hidden shadow-2xl">
            <div class="px-8 pt-8 pb-6 border-b flex items-center justify-between">
                <div>
                    <h3 class="text-3xl font-bold tracking-tight">Tidslinje – Alle skandaler</h3>
                    <p class="text-slate-500 mt-1">Sorteret efter år (nyeste først)</p>
                </div>
                <button onclick="closeTimeline()" class="text-3xl text-slate-400 hover:text-slate-600">×</button>
            </div>
            
            <div class="px-8 py-4 border-b bg-slate-50 flex flex-wrap gap-4 items-center">
                <div>
                    <label class="text-xs font-semibold text-slate-500 block mb-1">PARTI</label>
                    <select id="filterParty" onchange="filterTimeline()" class="border border-slate-300 rounded-xl px-3 py-1.5 text-sm">
                        <option value="">Alle partier</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-500 block mb-1">ALVORLIGHED</label>
                    <select id="filterSeverity" onchange="filterTimeline()" class="border border-slate-300 rounded-xl px-3 py-1.5 text-sm">
                        <option value="">Alle</option>
                        <option value="5">5 stjerner</option>
                        <option value="4">4+ stjerner</option>
                        <option value="3">3+ stjerner</option>
                    </select>
                </div>
                <button onclick="resetTimelineFilters()" class="mt-5 text-sm px-4 py-1.5 border border-slate-300 rounded-xl hover:bg-white">Nulstil filtre</button>
            </div>
            
            <div id="timelineContent" class="p-8 overflow-y-auto max-h-[calc(90vh-180px)] space-y-4">
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/version.js"></script>
    <script src="js/modal-core.js"></script>
    <script src="js/modal-scandal.js"></script>
    <script src="js/modal-voting.js"></script>
    <script src="js/modal-comments.js"></script>
    <script src="js/modal-donor.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/timeline.js"></script>
    <script src="js/main.js"></script>
    <script src="js/modal-broken-promises.js"></script>
    <script src="js/modal-share.js"></script>
    <script src="js/modal-party.js"></script>
    <script src="js/modal-compare.js"></script>
    <script src="js/modal-stats.js"></script>
    <script src="js/modal-pdf-export.js"></script>

    <!-- jsPDF CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        function setVersion() {
            if (typeof APP_VERSION !== 'undefined') {
                const ids = ['app-version', 'app-version-hero', 'app-version-footer'];
                ids.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.textContent = APP_VERSION;
                });
                
                const navbar = document.getElementById('navbar-version');
                if (navbar) navbar.textContent = APP_VERSION + " Split";
            }
        }
        
        window.onload = function() {
            if (typeof initializeEverything === 'function') {
                initializeEverything();
            }
            setVersion();
            setTimeout(setVersion, 500);
        };
    </script>
</body>
</html>
